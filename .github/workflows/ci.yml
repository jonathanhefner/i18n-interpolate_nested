name: CI
on: [push, pull_request]
jobs:
  tests:
    strategy:
      matrix:
        ruby: ["3.4", "4.0"]
        gemfile: [rails-8.1]
      fail-fast: false

    runs-on: ubuntu-latest

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: bin/test
